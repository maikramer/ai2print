name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install GTK4 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgraphene-1.0-dev \
            pkg-config

      - name: Cargo check
        run: cargo check --release

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Clified and compile Python modules
        run: |
          python -m pip install --upgrade pip
          pip install "clified>=0.4.1"
          python -m py_compile clified_install.py python/*.py

      - name: Smoke Clified registry
        run: |
          cp tools.yaml.example tools.yaml
          clified-install --list
